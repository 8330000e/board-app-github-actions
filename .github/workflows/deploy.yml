name: Deploy to EC2 # GitHub Actions 탭에서 표시되는 workflow 이름

on:
  push:
    branches:
      [main] # main 브랜치에 push될 때마다 자동 실행
      # 다른 브랜치 push에서는 실행 안 됨

jobs:
  deploy:
    runs-on:
      ubuntu-latest # GitHub가 제공하는 Ubuntu 가상머신에서 실행
      # 이 가상머신이 EC2에 SSH 접속해서 명령어를 실행함

    steps:
      - name: EC2 접속
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }} # → 3.34.61.231
          username: ${{ secrets.EC2_USERNAME }} # → ubuntu
          key: ${{ secrets.EC2_KEY }} # → pem 내용

          script: | # 실제 코드 수정하는 부분
            cd ~/board-app-github-actions-v1
            docker compose pull
            docker compose up -d
            docker image prune -f

